<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sessions — Becky Taha'Blu</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Age Verification Modal */
      .age-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      .age-modal-content {
        background: #1a1a1a;
        border: 2px solid #7fd5ff;
        padding: 30px;
        border-radius: 8px;
        text-align: center;
        color: #fff;
        max-width: 400px;
      }
      
      .age-modal-content h2 {
        color: #7fd5ff;
        margin-top: 0;
        font-size: 1.8rem;
      }
      
      .age-modal-content p {
        color: #ccc;
        margin: 1rem 0;
      }
      
      .age-modal button {
        margin: 10px;
        padding: 10px 20px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s;
      }
      
      #age-confirm {
        background: #7fd5ff;
        color: #000;
      }
      
      #age-confirm:hover {
        background: #5fb8d4;
      }
      
      #age-deny {
        background: #333;
        color: #fff;
        border: 1px solid #555;
      }
      
      #age-deny:hover {
        background: #444;
      }
      
      .page-hero {
        position: relative;
        width: 100%;
        height: 300px;
        overflow: hidden;
      }
      
      .page-hero-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <!-- Age Verification Modal -->
    <div id="age-verification-modal" class="age-modal">
      <div class="age-modal-content">
        <h2>⚠️ Age Verification</h2>
        <p>You must be 18+ to enter this site.</p>
        <button id="age-confirm">I am 18 or older</button>
        <button id="age-deny">Exit</button>
      </div>
    </div>

    <header class="assets/website.webp">
        <img src="assets/website.webp" alt="Sessions Hero Image" class="assets/website.webp">
      <img src="assets/website.webp alt="Sessions Hero Image" class="assets/website.webp">
    </header>
    <header>
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="sessions.html" aria-current="page">Sessions</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h1>Sessions</h1>

        <h2>Virtual Sessions</h2>
        <ul>
          <li>Private Pictures</li>
          <li>Video Call</li>
          <li>Curated Content</li>
          <li>And more…</li>
        </ul>

        <p>
          For booking and availability, please use the Contact page.
        </p>
      </section>
    </main>

    <script src="script.js" defer></script>
    <script>
      // Age Verification Logic
      document.addEventListener("DOMContentLoaded", function() {
        const ageModal = document.getElementById("age-verification-modal");
        const confirmBtn = document.getElementById("age-confirm");
        const denyBtn = document.getElementById("age-deny");
        
        // Check if user has already verified
        if (localStorage.getItem("ageVerified") !== "true") {
          ageModal.style.display = "flex";
        } else {
          ageModal.style.display = "none";
        }
        
        // Confirm age
        confirmBtn.addEventListener("click", function() {
          localStorage.setItem("ageVerified", "true");
          ageModal.style.display = "none";
        });
        
        // Deny age - redirect
        denyBtn.addEventListener("click", function() {
          window.location.href = "https://google.com";
        });
      });
    </script>
  </body>
</html>
